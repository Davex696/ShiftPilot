<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ShiftPilot</title>
</head>
<body>
    <header>
    <h1>ShiftPilot</h1>
    </header>

    <main>
    <div id="stats">
        <div class="card">
            <div class="card-label">Total Shifts</div> 
            <span id="totalShifts">0</span>
        </div>

        <div class="card">
            <div class="card-label">Busiest Day</div>
            <span id="busiestDay">-</span>
        </div>

        <div class="card">
            <div class="card-label">Most Scheduled</div> 
            <span id="mostScheduled"></span>
        </div>
    </div>
    <form>
        <label for="staffName">Staff Name</label> 
        <input type="text" id="staffName">

        <label for="day">Day</label>
        <select id="day">
            <option value="">-- Select Day --</option>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
        </select>

        <label for="time">Time</label> 
        <input type="time" id="time">

        <button type="submit">Add Shift</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Staff Name</th>
                <th>Day</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="scheduleTable">

        </tbody>
    </table>

    <div id="insights">
    <div class="section-label">Weekly Insights</div>
    <div id="chart"></div>
</div>
    </main>

    <script src="index.js"></script>
</body>
</html>
