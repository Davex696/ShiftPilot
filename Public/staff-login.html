<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ShiftPilot — Staff Login</title>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">ShiftPilot</div>
            <p class="login-subtitle">Staff Access</p>
            <div class="login-form">
                <label>Your Staff ID</label>
                <input type="text" id="staffId" placeholder="e.g. SP-000">
                <button class="btn-primary" id="staffLoginBtn">Enter</button>
                <p id="staffLoginError"></p>
                <a href="login.html" style="text-align:center; color:#6b7280; font-size:0.85rem; text-decoration:none">← Back</a>
            </div>
        </div>
    </div>
    <script src="staff-login.js"></script>
</body>
</html>
